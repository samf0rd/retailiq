retailiq:
  target: dev
  outputs:
    dev:
      type: duckdb
      # Path is relative to where `dbt run` is executed (the dbt/ directory).
      # If you run dbt from the repo root use: data/retailiq.duckdb
      # If you run from dbt/ directory use: ../data/retailiq.duckdb
      # This must match the file ingestion/load_raw.py loaded raw.* into, and
      # the file docker-compose mounts at /data/retailiq.duckdb for the API —
      # a single warehouse file used end-to-end, not the older warehouse/ path.
      path: "../data/retailiq.duckdb"
      threads: 4
      # Attach the raw schema so dbt can resolve `source()` refs to raw tables
      # that were loaded by load_raw.py — no separate DB needed.
