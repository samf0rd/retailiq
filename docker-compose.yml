# docker-compose.yml
# Production stack: FastAPI backend, Next.js dashboard, Caddy reverse proxy.
# Caddy handles HTTPS automatically via Let's Encrypt — just point DNS at
# this server and give it a real domain in the Caddyfile, no cert wrangling.

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    volumes:
      # The DuckDB warehouse file lives on the host, mounted read-only into
      # the container. Rebuilding the warehouse (dbt build) on the host and
      # restarting this container is how you refresh data without a new image.
      - ./data/retailiq.duckdb:/data/retailiq.duckdb:ro
      # Bundled dbt model metadata (SQL, tests, lineage) for the SqlDrawer/
      # Methodology page — regenerated by the prebuild script, read by both
      # the API (if it serves it) and the dashboard build.
      - ./data/models.json:/data/models.json:ro
    environment:
      - RETAILIQ_DB_PATH=/data/retailiq.duckdb
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    restart: unless-stopped
    environment:
      # Server-side fetches from the dashboard's Next.js API routes/RSC hit
      # the api service by its Docker network name, not localhost.
      - NEXT_PUBLIC_API_BASE_URL=https://retailiq.samvgarcia.com/api
      - INTERNAL_API_BASE_URL=http://api:8000
    expose:
      - "3000"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
      - api

volumes:
  caddy_data:
  caddy_config:
