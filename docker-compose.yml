services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    volumes:
      - ./data/retailiq.duckdb:/data/retailiq.duckdb:ro
      - ./data/models.json:/data/models.json:ro
    environment:
      - RETAILIQ_DB_PATH=/data/retailiq.duckdb
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "127.0.0.1:8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3